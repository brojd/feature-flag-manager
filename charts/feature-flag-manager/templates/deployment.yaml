apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-flag-manager
  labels:
    app.kubernetes.io/name: feature-flag-manager
    app.kubernetes.io/instance: feature-flag-manager
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: feature-flag-manager-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: feature-flag-manager
      app.kubernetes.io/instance: feature-flag-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: feature-flag-manager
        app.kubernetes.io/instance: feature-flag-manager
    spec:
      containers:
        - name: feature-flag-manager
          image: feature-flag-manager:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3

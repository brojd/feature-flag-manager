replicaCount: 1

image:
  repository: feature-flag-manager
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3005

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: feature-flags.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
